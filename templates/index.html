<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spam Detection System</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 15px;
            width: 400px;
            text-align: center;
            color: white;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            font-size: 14px;
            opacity: 0.8;
        }

        textarea {
            width: 100%;
            height: 100px;
            margin-top: 15px;
            border-radius: 8px;
            border: none;
            padding: 10px;
            font-size: 14px;
        }

        button {
            margin-top: 15px;
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #00c9a7;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #02a387;
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }

        .spam {
            color: #ff4d4d;
        }

        .notspam {
            color: #00ffae;
        }

        .footer {
            margin-top: 15px;
            font-size: 12px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📩 Spam Detector</h1>
    <p>AI-based message classification system</p>

    <form method="POST">
        <textarea name="message" placeholder="Enter your message..."></textarea>
        <button type="submit">Check Message</button>
    </form>

    {% if result %}
        <div class="result 
            {% if 'SPAM' in result %}spam{% else %}notspam{% endif %}">
            {{ result }}
        </div>
    {% endif %}

    <div class="footer">
        Mini Project | Deep Learning PBL
    </div>
</div>

</body>
</html>
